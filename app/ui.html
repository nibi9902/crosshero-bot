<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Crosshero · Reservar</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #161616;
    --border: #2a2a2a;
    --text: #ededed;
    --muted: #8a8a8a;
    --accent: #ff6b35;
    --accent-dark: #d4521f;
    --success: #4ade80;
    --error: #f87171;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    background: var(--bg); color: var(--text);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 18px 0 12px; position: sticky; top: 0; background: var(--bg);
    border-bottom: 1px solid var(--border); z-index: 10;
  }
  h1 { font-size: 22px; margin: 0; font-weight: 700; letter-spacing: -0.02em; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .controls { display: flex; gap: 8px; margin: 12px 0 4px; flex-wrap: wrap; }
  .controls select, .controls input {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: 10px; font: inherit; font-size: 14px;
  }
  .day-group { margin: 16px 0; }
  .day-label {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    color: var(--muted); letter-spacing: 0.08em; padding: 0 4px 6px;
  }
  .class-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    cursor: pointer; user-select: none; transition: all 0.15s;
  }
  .class-item.selected {
    border-color: var(--accent); background: rgba(255, 107, 53, 0.08);
  }
  .class-item.scheduled { opacity: 0.5; }
  .check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .selected .check {
    background: var(--accent); border-color: var(--accent);
  }
  .check svg { display: none; }
  .selected .check svg { display: block; }
  .info { flex: 1; }
  .info .time { font-weight: 600; font-size: 17px; }
  .info .meta { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 6px;
    background: var(--border); color: var(--muted);
  }
  footer {
    position: sticky; bottom: 0; background: linear-gradient(to top, var(--bg) 70%, transparent);
    padding: 16px 0 max(16px, env(safe-area-inset-bottom));
  }
  button.primary {
    width: 100%; padding: 16px; font-size: 16px; font-weight: 600;
    background: var(--accent); color: #fff; border: 0; border-radius: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  button.primary:active { background: var(--accent-dark); transform: scale(0.98); }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .status {
    margin: 12px 0; padding: 12px 16px; border-radius: 10px;
    font-size: 14px; display: none;
  }
  .status.show { display: block; }
  .status.success { background: rgba(74, 222, 128, 0.1); color: var(--success); border: 1px solid rgba(74, 222, 128, 0.3); }
  .status.error { background: rgba(248, 113, 113, 0.1); color: var(--error); border: 1px solid rgba(248, 113, 113, 0.3); }
  .loading { text-align: center; padding: 40px 0; color: var(--muted); }
  .empty { text-align: center; padding: 40px 16px; color: var(--muted); }
  .api-key-prompt {
    background: var(--card); padding: 20px; border-radius: 12px; margin: 24px 0;
    border: 1px solid var(--border);
  }
  .api-key-prompt input {
    width: 100%; padding: 12px; margin: 8px 0; font-family: ui-monospace, monospace;
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <h1>Crosshero · Reservar</h1>
  <div class="sub" id="subtitle">Carregant classes...</div>
  <div class="controls">
    <select id="program">
      <option value="Hyrox" selected>Hyrox</option>
      <option value="CrossFit">CrossFit</option>
      <option value="Strength">Strength</option>
      <option value="Full body">Full body</option>
      <option value="Ioga">Ioga</option>
    </select>
    <select id="days">
      <option value="7">Propers 7 dies</option>
      <option value="10" selected>Propers 10 dies</option>
      <option value="14">Properes 2 setmanes</option>
    </select>
  </div>
</header>

<div id="key-prompt" class="api-key-prompt" style="display:none;">
  <strong>Primera vegada?</strong><br>
  Enganxa la teva API_KEY (es guardarà al telèfon):
  <input type="password" id="key-input" placeholder="API key">
  <button class="primary" onclick="saveKey()">Guardar</button>
</div>

<main id="list">
  <div class="loading">Carregant…</div>
</main>

<div class="status" id="status"></div>

<footer>
  <button class="primary" id="submit" disabled>Reservar (0)</button>
</footer>

<script>
const API_BASE = window.location.origin;
const KEY_STORAGE = 'crosshero_api_key';

let apiKey = localStorage.getItem(KEY_STORAGE) || '';
let allItems = [];
let selected = new Set();

function $(id) { return document.getElementById(id); }

function setStatus(msg, kind) {
  const s = $('status');
  s.textContent = msg;
  s.className = 'status show ' + (kind || '');
  if (kind === 'success') setTimeout(() => s.classList.remove('show'), 5000);
}

function checkKey() {
  if (!apiKey) {
    $('key-prompt').style.display = 'block';
    $('list').innerHTML = '';
    return false;
  }
  $('key-prompt').style.display = 'none';
  return true;
}

function saveKey() {
  const v = $('key-input').value.trim();
  if (!v) return;
  apiKey = v;
  localStorage.setItem(KEY_STORAGE, v);
  load();
}

async function load() {
  if (!checkKey()) return;
  const program = $('program').value;
  const days = $('days').value;
  $('list').innerHTML = '<div class="loading">Carregant…</div>';
  $('subtitle').textContent = `Buscant ${program} dels propers ${days} dies...`;
  selected.clear();
  updateSubmit();

  try {
    const r = await fetch(`${API_BASE}/upcoming?program=${encodeURIComponent(program)}&days=${days}`, {
      headers: { 'X-Api-Key': apiKey },
    });
    if (r.status === 401) {
      localStorage.removeItem(KEY_STORAGE);
      apiKey = '';
      setStatus('API key invàlida. Torna a entrar-la.', 'error');
      checkKey();
      return;
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    allItems = data.items || [];
    render();
    $('subtitle').textContent = `${allItems.length} classes ${program} disponibles`;
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
    $('list').innerHTML = '<div class="empty">No s\'han pogut carregar les classes</div>';
  }
}

function render() {
  const list = $('list');
  if (!allItems.length) {
    list.innerHTML = '<div class="empty">Cap classe disponible</div>';
    return;
  }

  // Agrupar per dia
  const byDay = {};
  for (const item of allItems) {
    const key = item.date;
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(item);
  }

  let html = '';
  for (const date of Object.keys(byDay).sort()) {
    const items = byDay[date];
    const first = items[0];
    const dayHeader = first.label.split(' ').slice(0, 2).join(' '); // "Dl 18/05"
    html += `<div class="day-group"><div class="day-label">${dayHeader}</div>`;
    for (const it of items) {
      const id = `${it.date}-${it.time}`;
      const isScheduled = it.already_scheduled;
      html += `
        <div class="class-item ${isScheduled ? 'scheduled' : ''}" data-id="${id}" data-class-id="${it.class_id}" data-date="${it.date}" data-time="${it.time}" data-program="${it.program}">
          <div class="check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="info">
            <div class="time">${it.time}</div>
            <div class="meta">${it.program}${isScheduled ? ' · ja programada' : ''}</div>
          </div>
        </div>`;
    }
    html += '</div>';
  }
  list.innerHTML = html;

  list.querySelectorAll('.class-item:not(.scheduled)').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (selected.has(id)) { selected.delete(id); el.classList.remove('selected'); }
      else { selected.add(id); el.classList.add('selected'); }
      updateSubmit();
    });
  });
}

function updateSubmit() {
  const btn = $('submit');
  btn.textContent = `Reservar (${selected.size})`;
  btn.disabled = selected.size === 0;
}

async function submit() {
  if (!selected.size) return;
  const items = [];
  document.querySelectorAll('.class-item.selected').forEach(el => {
    items.push({
      program: el.dataset.program,
      date: el.dataset.date,
      time: el.dataset.time,
    });
  });

  $('submit').disabled = true;
  $('submit').textContent = 'Programant...';
  setStatus('Programant reserves...', '');

  try {
    const r = await fetch(`${API_BASE}/schedule`, {
      method: 'POST',
      headers: { 'X-Api-Key': apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ items }),
    });
    const data = await r.json();
    const okCount = (data.scheduled || []).length;
    const errCount = (data.errors || []).length;
    if (okCount && !errCount) {
      setStatus(`✅ ${okCount} reserves programades`, 'success');
    } else if (okCount && errCount) {
      setStatus(`⚠️ ${okCount} programades, ${errCount} errors`, 'error');
    } else {
      setStatus(`❌ ${errCount} errors: ` + (data.errors?.[0]?.error || ''), 'error');
    }
    if (okCount) {
      selected.clear();
      load();
    }
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  } finally {
    updateSubmit();
  }
}

$('submit').addEventListener('click', submit);
$('program').addEventListener('change', load);
$('days').addEventListener('change', load);

if (checkKey()) load();
</script>
</body>
</html>
